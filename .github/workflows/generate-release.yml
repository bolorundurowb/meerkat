name: Generate Release

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  release:
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Extract version and check tag
        id: version
        shell: bash
        run: |
          VERSION=$(dotnet msbuild src/meerkat/meerkat.csproj -getProperty:PackageVersion)
          if [ -z "$VERSION" ]; then
            echo "Failed to extract version."
            exit 1
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

          TAG="v$VERSION"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists. Skipping release."
            echo "should_release=false" >> $GITHUB_OUTPUT
          else
            echo "should_release=true" >> $GITHUB_OUTPUT
          fi

      - name: Build and Pack
        if: steps.version.outputs.should_release == 'true'
        run: |
          dotnet build src/meerkat/meerkat.csproj --configuration Release
          dotnet pack src/meerkat/meerkat.csproj --configuration Release --no-build -o ./artifacts

      - name: Create GitHub Release
        if: steps.version.outputs.should_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          prerelease: ${{ contains(steps.version.outputs.version, '-alpha') || contains(steps.version.outputs.version, '-beta') }}
          generate_release_notes: true
          files: artifacts/*.nupkg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
